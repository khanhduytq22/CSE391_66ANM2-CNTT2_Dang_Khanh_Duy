<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản lý Sinh viên</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>
    <div class="container">
        <h2> QUẢN LÝ ĐIỂM SINH VIÊN</h2>

        <form id="studentForm" class="input-section">
            <div class="form-group">
                <label for="txtName">Họ và tên</label>
                <input type="text" id="txtName" placeholder="Nhập tên sinh viên..." required>
            </div>
            <div class="form-group">
                <label for="txtScore">Điểm số</label>
                <input type="number" id="txtScore" placeholder="0-10" min="0" max="10" step="0.1" required>
            </div>
            <div class="form-group btn-area">
                <label>&nbsp;</label>
                <button type="submit" id="btnAdd">Thêm sinh viên</button>
            </div>
        </form>

        <hr>

        <div class="toolbar">
            <div class="search-box">
                <input type="text" id="searchName" placeholder="Tìm kiếm theo tên...">
            </div>
            <div class="filter-box">
                <select id="filterRank">
                    <option value="All">Tất cả xếp loại</option>
                    <option value="Giỏi">Học lực: Giỏi</option>
                    <option value="Khá">Học lực: Khá</option>
                    <option value="Trung bình">Học lực: Trung bình</option>
                    <option value="Yếu">Học lực: Yếu</option>
                </select>
            </div>
        </div>

        <div class="table-wrapper">
            <table border="1" width="100%">
                <thead>
                    <tr>
                        <th width="50">STT</th>
                        <th>Họ tên</th>
                        <th id="sortScore" class="sortable">Điểm <span id="sortIcon">↕</span></th>
                        <th>Xếp loại</th>
                        <th width="80">Quản lý</th>
                    </tr>
                </thead>
                <tbody id="studentBody">
                    </tbody>
            </table>
        </div>

        <div class="footer-stats" id="statsArea">
            <div class="stat-item">Tổng số: <strong>0</strong></div>
            <div class="stat-item">Trung bình lớp: <strong class="avg-highlight">0</strong></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
