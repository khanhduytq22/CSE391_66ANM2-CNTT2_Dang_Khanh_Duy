<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Đặt Hàng Trực Tuyến</title>
    <link rel="stylesheet" href="2_2.css">
</head>
<body>
    <div class="container">
        <h2>ĐẶT HÀNG TRỰC TUYẾN</h2>
        
        <form id="orderForm">
            <div class="form-row">
                <div class="form-group" id="group-product">
                    <label>Sản phẩm</label>
                    <select id="product">
                        <option value="">-- Chọn sản phẩm --</option>
                        <option value="Laptop">Laptop (20.000.000đ)</option>
                        <option value="Smartphone">Smartphone (10.000.000đ)</option>
                        <option value="Keyboard">Bàn phím cơ (1.500.000đ)</option>
                        <option value="Mouse">Chuột Gaming (800.000đ)</option>
                    </select>
                    <div class="error-msg"></div>
                </div>

                <div class="form-group" id="group-quantity">
                    <label>Số lượng (1-99)</label>
                    <input type="number" id="quantity" value="1">
                    <div class="error-msg"></div>
                </div>
            </div>

            <div class="total-display">
                Tổng cộng: <span id="totalPrice">0đ</span>
            </div>

            <div class="form-group" id="group-deliveryDate">
                <label>Ngày giao hàng mong muốn</label>
                <input type="date" id="deliveryDate">
                <div class="error-msg"></div>
            </div>

            <div class="form-group" id="group-address">
                <label>Địa chỉ giao hàng</label>
                <input type="text" id="address" placeholder="Ít nhất 10 ký tự...">
                <div class="error-msg"></div>
            </div>

            <div class="form-group" id="group-note">
                <div class="label-row">
                    <label>Ghi chú</label>
                    <span id="charCount">0/200</span>
                </div>
                <textarea id="note" rows="3" placeholder="Nhập yêu cầu đặc biệt..."></textarea>
                <div class="error-msg"></div>
            </div>

            <div class="form-group" id="group-payment">
                <label>Phương thức thanh toán</label>
                <div class="radio-group">
                    <label><input type="radio" name="payment" value="COD"> COD</label>
                    <label><input type="radio" name="payment" value="Chuyển khoản"> Chuyển khoản</label>
                    <label><input type="radio" name="payment" value="Ví điện tử"> Ví điện tử</label>
                </div>
                <div class="error-msg"></div>
            </div>

            <button type="submit" id="btnSubmit">Đặt Hàng Ngay</button>
        </form>
    </div>

    <div id="confirmOverlay" class="overlay">
        <div class="modal">
            <h3>Xác nhận đặt hàng?</h3>
            <div id="summaryContent"></div>
            <div class="modal-buttons">
                <button id="btnConfirm" class="btn-primary">Xác nhận</button>
                <button id="btnCancel" class="btn-secondary">Hủy</button>
            </div>
        </div>
    </div>

    <div id="successToast" class="toast">Đặt hàng thành công! 🎉</div>

    <script src="2_2.js"></script>
</body>
</html>
