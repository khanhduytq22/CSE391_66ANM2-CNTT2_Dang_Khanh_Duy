<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Multi-step Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
            <div class="step-indicator active">1</div>
            <div class="step-indicator">2</div>
            <div class="step-indicator">3</div>
        </div>

        <form id="multiStepForm">
            <div class="step active" id="step1">
                <h3>Bước 1: Thông tin cá nhân</h3>
                <div class="form-group">
                    <label>Họ và tên</label>
                    <input type="text" id="fullname" placeholder="Nhập ít nhất 3 ký tự">
                    <div class="error-msg"></div>
                </div>
                <div class="form-group">
                    <label>Ngày sinh</label>
                    <input type="date" id="dob">
                    <div class="error-msg"></div>
                </div>
                <div class="form-group">
                    <label>Giới tính</label>
                    <select id="gender">
                        <option value="">-- Chọn --</option>
                        <option value="Nam">Nam</option>
                        <option value="Nữ">Nữ</option>
                        <option value="Khác">Khác</option>
                    </select>
                    <div class="error-msg"></div>
                </div>
            </div>

            <div class="step" id="step2">
                <h3>Bước 2: Thông tin tài khoản</h3>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="example@gmail.com">
                    <div class="error-msg"></div>
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" id="password" placeholder="Tối thiểu 8 ký tự">
                    <div class="error-msg"></div>
                </div>
                <div class="form-group">
                    <label>Xác nhận mật khẩu</label>
                    <input type="password" id="confirmPassword">
                    <div class="error-msg"></div>
                </div>
            </div>

            <div class="step" id="step3">
                <h3>Bước 3: Kiểm tra thông tin</h3>
                <div class="summary" id="summaryBox">
                    </div>
            </div>

            <div class="button-group">
                <button type="button" id="btnPrev" disabled>Quay lại</button>
                <button type="button" id="btnNext">Tiếp theo</button>
                <button type="submit" id="btnSubmit" style="display: none;">Xác nhận đăng ký</button>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
